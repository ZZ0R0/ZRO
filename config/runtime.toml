# zro runtime configuration (development defaults)

[server]
host = "0.0.0.0"
port = 8090

[apps]
manifest_dir = "./apps"
data_dir = "./data"
default_app = "custom-shell"

[session]
secret = "dev-secret-change-in-production"
ttl_seconds = 86400
cookie_name = "zro-session"

[auth]
users_file = "./config/users.toml"

[logging]
level = "debug"
format = "pretty"

[supervisor]
shutdown_timeout_seconds = 10
health_check_interval_seconds = 5
max_restart_attempts = 3

[control]
socket_path = "/tmp/zro/control.sock"
ipc_dir = "/tmp/zro/ipc"
