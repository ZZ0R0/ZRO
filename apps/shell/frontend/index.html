<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZRO Desktop</title>
    <link rel="stylesheet" href="/shell/style.css?v=1773378881">
</head>
<body>
    <div id="desktop">
        <!-- Windows are created dynamically here -->
    </div>

    <div id="taskbar">
        <button id="launcher-btn" class="taskbar-btn" title="Launch app">&#x1F680;</button>
        <div id="taskbar-apps"></div>
        <div id="taskbar-clock"></div>
    </div>

    <!-- App launcher overlay -->
    <div id="launcher" class="hidden">
        <div class="launcher-content">
            <h2>Applications</h2>
            <div id="launcher-apps"></div>
        </div>
    </div>

    <!-- Notification area -->
    <div id="notifications"></div>

    <script src="/static/zro-client.js?v=1773378881"></script>
    <script src="/shell/window-manager.js?v=1773378881"></script>
    <script src="/shell/taskbar.js?v=1773378881"></script>
    <script src="/shell/launcher.js?v=1773378881"></script>
    <script src="/shell/desktop.js?v=1773378881"></script>
</body>
</html>
